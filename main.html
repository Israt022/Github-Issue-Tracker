<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!--Tailwind & Daisy UI-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Geist Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-base-200">
    <nav class="bg-white p-5 border flex justify-center items-center sm:justify-between flex-col gap-5 sm:flex-row mx-auto">
        <div class="flex gap-2 items-center">
            <img src="./assets/github-logo.png" alt="" class="w-[36px] h-[37px]">
            <h1>GitHub Issues Tracker</h1>
        </div>
        <div class="join gap-4">
            <div>
                <label class="input rounded-sm border focus-within:border-gray-500">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g
                        stroke-linejoin="round"
                        stroke-linecap="round"
                        stroke-width="2.5"
                        fill="none"
                        stroke="currentColor"
                        >
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" class="" placeholder="Search issues..." />
                </label>
                <div class="validator-hint hidden">Enter valid email address</div>
            </div>
            <button class="btn btn-primary join-item rounded-sm">+ New Issue</button>
        </div>
    </nav>
</body>
</html>
